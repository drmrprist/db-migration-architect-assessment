name: DB Migration CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  AZURE_SQL_SERVER: ${{ secrets.AZURE_SQL_SERVER }}
  AZURE_SQL_DB: AdventureWorks2022
  ACR_NAME: ${{ secrets.ACR_NAME }}
  RESOURCE_GROUP: rg-db-migration-assessment

jobs:
  # =============================================
  # JOB 1: Build and Scan Container
  # =============================================
  build:
    name: Build Container Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container image
        run: |
          docker build \
            -f docker/Dockerfile.sqlserver-app \
            -t db-migration-app:${{ github.sha }} \
            -t db-migration-app:latest \
            .

      - name: Run container smoke test
        run: |
          docker run --rm db-migration-app:latest echo "Container smoke test passed"

      - name: Image scan placeholder
        run: |
          echo "IMAGE SCAN: In production this step runs Trivy or Defender for Containers"
          echo "Command: trivy image db-migration-app:${{ github.sha }}"

  # =============================================
  # JOB 2: Push to Azure Container Registry
  # =============================================
  push-to-acr:
    name: Push to ACR
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login
        run: |
          echo "DRY RUN: az login --service-principal"
          echo "DRY RUN: az acr login --name $ACR_NAME"

      - name: Push to ACR
        run: |
          echo "DRY RUN: docker tag db-migration-app:${{ github.sha }} ${ACR_NAME}.azurecr.io/db-migration-app:${{ github.sha }}"
          echo "DRY RUN: docker push ${ACR_NAME}.azurecr.io/db-migration-app:${{ github.sha }}"

  # =============================================
  # JOB 3: Pre-Migration Checks
  # =============================================
  pre-migration-check:
    name: Pre-Migration Checks
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pymssql

      - name: Run pre-migration inventory
        run: |
          echo "DRY RUN: Run discovery/db_dependency_crawler.py against source"
          echo "DRY RUN: sqlcmd -S SOURCE_DB -i discovery/sqlserver_inventory.sql"
          echo "PRE-CHECK: Source database connectivity verified"
          echo "PRE-CHECK: Schema inventory captured"
          echo "PRE-CHECK: Row counts baseline captured"

  # =============================================
  # JOB 4: Schema Deploy
  # =============================================
  schema-deploy:
    name: Deploy Schema to Target
    runs-on: ubuntu-latest
    needs: pre-migration-check
    steps:
      - name: Deploy schema
        run: |
          echo "DRY RUN: sqlpackage /Action:Extract /SourceConnectionString:SOURCE_CONN"
          echo "DRY RUN: sqlpackage /Action:Publish /TargetConnectionString:TARGET_CONN"
          echo "SCHEMA DEPLOY: Schema deployed to Azure SQL Database"

  # =============================================
  # JOB 5: Data Migration (Manual Approval Gate)
  # =============================================
  data-migration:
    name: Data Migration
    runs-on: ubuntu-latest
    needs: schema-deploy
    environment: migration-approval
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Execute migration
        run: |
          echo "DRY RUN: ./migration/sqlserver/migrate_adventureworks.sh"
          echo "MIGRATION: Backup taken from source"
          echo "MIGRATION: Backup restored to Azure SQL Database target"
          echo "MIGRATION: Migration completed successfully"

  # =============================================
  # JOB 6: Validation
  # =============================================
  validate:
    name: Validate Migration
    runs-on: ubuntu-latest
    needs: data-migration
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pymssql

      - name: Run validation
        run: |
          echo "DRY RUN: python3 validation/reconciliation.py"
          echo "VALIDATION: Row counts matched - 71 tables"
          echo "VALIDATION: Schema matched - 744 columns"
          echo "VALIDATION: Checksums matched - 5 key tables"
          echo "VALIDATION: Foreign keys matched - 90"
          echo "VALIDATION: STATUS PASSED"

      - name: Upload validation report
        run: |
          echo "DRY RUN: Upload validation_report.json as pipeline artifact"

  # =============================================
  # JOB 7: Cutover
  # =============================================
  cutover:
    name: Application Cutover
    runs-on: ubuntu-latest
    needs: validate
    environment: cutover-approval
    steps:
      - name: Switch connection string
        run: |
          echo "DRY RUN: az keyvault secret set --name DB-CONNECTION-STRING --value TARGET_CONN"
          echo "DRY RUN: az webapp config appsettings set --settings DB_HOST=TARGET_HOST"
          echo "CUTOVER: Application connection switched to Azure SQL Database"

      - name: Run smoke test
        run: |
          echo "DRY RUN: bash validation/smoke_test.sh"
          echo "SMOKE TEST: Health endpoint verified"
          echo "SMOKE TEST: Read transaction verified"
          echo "SMOKE TEST: Write transaction verified"

  # =============================================
  # JOB 8: Rollback Gate
  # =============================================
  rollback:
    name: Rollback if needed
    runs-on: ubuntu-latest
    needs: cutover
    if: failure()
    steps:
      - name: Execute rollback
        run: |
          echo "ROLLBACK: Switching connection string back to source DB"
          echo "DRY RUN: az webapp config appsettings set --settings DB_HOST=SOURCE_HOST"
          echo "ROLLBACK: Application restored to source database"
          echo "ROLLBACK: Incident logged for hypercare review"
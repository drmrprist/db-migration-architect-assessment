events {
    worker_connections 1024;
}

http {
    upstream sqlserver_source {
        server sqlserver-source:1433;
    }

    server {
        listen 80;
        server_name localhost;

        location /health {
            return 200 'migration-lab-healthy';
            add_header Content-Type text/plain;
        }

        location / {
            return 200 'DB Migration Lab - On-Prem Simulation Running';
            add_header Content-Type text/plain;
        }
    }
}